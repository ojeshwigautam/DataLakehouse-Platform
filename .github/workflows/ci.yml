name: Spark ETL CI

on:
  push:
    branches:
      - main
      - master
      - develop
  pull_request:
    branches:
      - main
      - master
      - develop

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"
  JAVA_VERSION: "17"

jobs:
  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-lint-${{ hashFiles('requirements-dev.txt', 'requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-lint-

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Black Formatting Check
        run: black --check .

      - name: isort Import Order Check
        run: isort --check-only --profile=black --line-length=88 .

      - name: Ruff Static Analysis
        run: ruff check .

  test:
    name: Tests & Coverage
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-test-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-test-

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify Spark
        run: python -c "import pyspark; print(f'PySpark {pyspark.__version__}')"

      - name: Run Tests with Coverage
        run: |
          python -m pytest tests/ \
            --cov=src \
            --cov-report=term-missing \
            --cov-report=html \
            --cov-config=.coveragerc \
            -v

      - name: Upload Coverage Report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: htmlcov/
          retention-days: 7

      - name: Coverage Summary
        run: |
          echo "## Coverage Summary" >> $GITHUB_STEP_SUMMARY
          python -m pytest tests/ \
            --cov=src \
            --cov-report=term-missing \
            --cov-config=.coveragerc \
            --quiet 2>&1 | tail -20 >> $GITHUB_STEP_SUMMARY

  docker:
    name: Docker Image Build
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build ETL Image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: commerce-lakehouse-etl:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Validate Docker Compose
        run: docker compose config --quiet 2>&1 && echo "✅ docker-compose.yml is valid"

  terraform:
    name: Terraform Validation
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    defaults:
      run:
        working-directory: ./terraform

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.0

      - name: Terraform Format Check
        run: terraform fmt -check -recursive
        continue-on-error: false

      - name: Terraform Init (local backend)
        run: terraform init -backend=false
        continue-on-error: true

      - name: Terraform Validate
        run: terraform validate
        continue-on-error: true

