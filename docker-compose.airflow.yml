version: "3.8"

x-airflow-common: &airflow-common
  build:
    context: .
    dockerfile: Dockerfile.airflow
  image: datalakehouse-platform-airflow:2.11
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__CORE__LOAD_EXAMPLES: "False"
    AIRFLOW__CORE__FERNET_KEY: ""
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "True"
    AIRFLOW__CORE__DEFAULT_TIMEZONE: Asia/Kolkata

    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-postgres:5432/airflow

    # Lakehouse DB connection (used by commerce_lakehouse_dag.py to run ETL)
    DB_HOST: postgres
    DB_PORT: 5432
    DB_NAME: commerce_lakehouse
    DB_USER: postgres
    DB_PASSWORD: postgres

    AIRFLOW_UID: 50000

  volumes:
    - ./airflow/dags:/opt/airflow/dags
    - ./logs:/opt/airflow/logs
    - ./plugins:/opt/airflow/plugins
    - .:/opt/airflow/project

  networks:
    - airflow-network

services:

  postgres:
    image: postgres:16
    container_name: commerce_lakehouse_postgres

    restart: unless-stopped

    environment:
      POSTGRES_DB: commerce_lakehouse
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    volumes:
      - commerce_lakehouse_data:/var/lib/postgresql/data

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U postgres -d commerce_lakehouse"
        ]
      interval: 10s
      timeout: 5s
      retries: 5

    networks:
      - airflow-network

  airflow-postgres:
    image: postgres:16
    container_name: commerce_airflow_postgres
    restart: always

    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow

    volumes:
      - airflow_postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow"]
      interval: 10s
      timeout: 5s
      retries: 5

    networks:
      - airflow-network

  airflow-init:
    <<: *airflow-common
    container_name: commerce_airflow_init

    depends_on:
      airflow-postgres:
        condition: service_healthy

    entrypoint: /bin/bash

    command:
      - -c
      - |
        airflow db migrate && \
        airflow users create \
          --username admin \
          --password admin123 \
          --firstname Ojeshwi \
          --lastname Gautam \
          --role Admin \
          --email admin@example.com && \
        python -m src.database.init_metadata

  airflow-webserver:
    <<: *airflow-common
    container_name: commerce_airflow_webserver
    restart: always

    depends_on:
      airflow-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy

    command: webserver

    ports:
      - "8081:8080"

    healthcheck:
      test: ["CMD-SHELL", "curl --fail http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  airflow-scheduler:
    <<: *airflow-common
    container_name: commerce_airflow_scheduler
    restart: always

    depends_on:
      airflow-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy

    command: scheduler

networks:
  airflow-network:
    driver: bridge

volumes:
  airflow_postgres_data:
  commerce_lakehouse_data:

