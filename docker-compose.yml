services:

  postgres:
    image: postgres:18
    container_name: commerce_lakehouse_postgres

    restart: unless-stopped

    environment:
      POSTGRES_DB: commerce_lakehouse
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports:
      - "5433:5432"

    volumes:
      - postgres_data:/var/lib/postgresql

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U postgres -d commerce_lakehouse"
        ]
      interval: 5s
      timeout: 5s
      retries: 10

    networks:
      - commerce-network

  etl:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: commerce_lakehouse_etl

    restart: on-failure

    depends_on:
      postgres:
        condition: service_healthy

    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: commerce_lakehouse
      DB_USER: postgres
      DB_PASSWORD: postgres

    volumes:
      - ./data:/app/data
      - ./logs:/app/logs

    healthcheck:
      test: ["CMD", "python", "--version"]
      interval: 30s
      timeout: 10s
      retries: 3

    networks:
      - commerce-network

  spark:
    image: apache/spark:4.2.0
    container_name: commerce_spark

    working_dir: /workspace

    volumes:
      - ./:/workspace

    stdin_open: true
    tty: true

    environment:
      SPARK_HOME: /opt/spark
      PYTHONPATH: /workspace

      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: commerce_lakehouse
      DB_USER: postgres
      DB_PASSWORD: postgres

      SPARK_DRIVER_MEMORY: 2g
      SPARK_EXECUTOR_MEMORY: 2g

    command: tail -f /dev/null

    depends_on:
      postgres:
        condition: service_healthy

    networks:
      - commerce-network

networks:
  commerce-network:
    driver: bridge

volumes:
  postgres_data:

